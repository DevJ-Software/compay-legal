<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos legales — ComPay Delivery</title>
<style>
  :root {
    --ink: #1b2430;
    --paper: #eff2f1;
    --accent: #1f6f78;
    --accent-soft: #dceeec;
    --line: #d7dbd9;
    --muted: #5b6560;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e7eae8;
      --paper: #14181a;
      --accent: #4fb8ae;
      --accent-soft: #1c2e2c;
      --line: #2a2f2e;
      --muted: #9aa6a1;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
  }
  main {
    max-width: 28rem;
    padding: 2rem;
    display: grid;
    gap: 1rem;
  }
  h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
  ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.75rem; }
  a {
    display: block;
    padding: 1rem 1.2rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
<main>
  <h1>ComPay Delivery — Documentos legales</h1>
  <ul>
    <li><a href="terms.html">Términos y Condiciones</a></li>
    <li><a href="privacy.html">Política de Privacidad</a></li>
  </ul>
</main>
</body>
</html>
